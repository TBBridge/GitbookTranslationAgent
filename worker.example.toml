# Local worker configuration for web-created translation jobs.
# Keep secrets in environment variables; do not place worker tokens here.

server_url = "https://your-vercel-app.vercel.app"
worker_name = "local-gitbook-worker"
token_env = "WORKER_TOKEN"

poll_interval_seconds = 5
heartbeat_interval_seconds = 30
lease_renewal_seconds = 20
request_timeout_seconds = 30

[dictionaries]
default = "./dictionaries/default"

[output_roots]
default = "./output"

[cache_roots]
default = "./.worker-cache"

[[providers]]
name = "ollama-local"
provider = "ollama"
model = "qwen3"
base_url = "http://127.0.0.1:11434"
roles = ["translate", "review"]

